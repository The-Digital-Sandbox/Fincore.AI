<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="base-gradient" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#3CB8F0" />
      <stop offset="50%" stop-color="#0A6FE8" />
      <stop offset="100%" stop-color="#0035A0" />
    </linearGradient>
    <linearGradient id="wave1-gradient" x1="0.8" y1="0" x2="0.2" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#A8EAFF" stop-opacity="0.55" />
      <stop offset="45%" stop-color="#70D8FF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#5ED4FF" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="wave2-gradient" x1="0.7" y1="0" x2="0.3" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6DDDFF" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#44BBFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1A90FF" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="wave3-gradient" x1="0.6" y1="0" x2="0.4" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50C8FF" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#2AA0F0" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0A6FE8" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="wave4-gradient" x1="0.5" y1="0" x2="0.5" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1A5FAA" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#0D4080" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#003070" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="ai-text-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B7FE0" />
      <stop offset="40%" stop-color="#005FCC" />
      <stop offset="100%" stop-color="#004FB0" />
    </linearGradient>
    <clipPath id="icon-clip">
      <rect width="1024" height="1024" rx="228" ry="228" />
    </clipPath>
  </defs>

  <!-- Rounded icon shape -->
  <g clip-path="url(#icon-clip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#base-gradient)" />

    <!-- Wave 1 - Lightest -->
    <path d="M1124,-60 C1160,300 260,420 -100,660 C-160,780 100,960 -100,1084 L1124,1084 Z" fill="url(#wave1-gradient)" />

    <!-- Wave 2 - Mid Light -->
    <path d="M1124,-180 C1140,180 120,300 -240,500 C-300,640 60,840 -100,1084 L1124,1084 Z" fill="url(#wave2-gradient)" />

    <!-- Wave 3 - Mid Dark -->
    <path d="M1124,-300 C1110,100 50,200 -360,360 C-420,480 30,700 -100,1084 L1124,1084 Z" fill="url(#wave3-gradient)" />

    <!-- Wave 4 - Darkest -->
    <path d="M1124,480 C880,660 500,900 260,980 C130,1030 0,1010 -100,1084 L1124,1084 Z" fill="url(#wave4-gradient)" />

    <!-- F mark - centered -->
    <text x="512" y="512" text-anchor="middle" dominant-baseline="central" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Helvetica Neue, Arial, sans-serif" font-size="460" font-weight="700" fill="white" letter-spacing="-6">F</text>
  </g>
</svg>
