<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#3CB8F0" />
      <stop offset="50%" stop-color="#0A6FE8" />
      <stop offset="100%" stop-color="#0035A0" />
    </linearGradient>
    <linearGradient id="bg-wave1" x1="0.8" y1="0" x2="0.2" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#A8EAFF" stop-opacity="0.55" />
      <stop offset="45%" stop-color="#70D8FF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#5ED4FF" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="bg-wave2" x1="0.7" y1="0" x2="0.3" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6DDDFF" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#44BBFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1A90FF" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="bg-wave3" x1="0.6" y1="0" x2="0.4" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50C8FF" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#2AA0F0" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0A6FE8" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="bg-wave4" x1="0.5" y1="0" x2="0.5" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1A5FAA" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#0D4080" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#003070" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-gradient)" />

  <!-- Wave 1 - Lightest -->
  <path d="M2100,-60 C2140,300 480,420 -180,660 C-300,780 180,960 -180,1140 L2100,1140 Z" fill="url(#bg-wave1)" />

  <!-- Wave 2 - Mid Light -->
  <path d="M2100,-180 C2120,180 220,300 -440,500 C-560,640 110,840 -180,1140 L2100,1140 Z" fill="url(#bg-wave2)" />

  <!-- Wave 3 - Mid Dark -->
  <path d="M2100,-300 C2060,100 90,200 -660,360 C-780,480 50,700 -180,1140 L2100,1140 Z" fill="url(#bg-wave3)" />

  <!-- Wave 4 - Darkest -->
  <path d="M2100,480 C1640,660 920,900 480,980 C240,1030 0,1010 -180,1140 L2100,1140 Z" fill="url(#bg-wave4)" />
</svg>
